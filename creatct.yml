---
- name: Creation d'un container lxc
  hosts: localhost
  connection: local
  vars:
    container_count: 2
    base_vmid: 305
    base_hostname: "ServerMinecraft-"
    base_ip: "10.1.0.101"
    template: "local:vztmpl/debian-12-standard_12.12-1_amd64.tar.zst"
    ssh_public_key: "{{ lookup('file', '~/.ssh/id_rsa.pub') }}"
    gateway: "10.1.0.254"
    netmask: "24"
    cores: 2
    memory: 1024
    api_host: "10.1.0.253"
  vars_files:
    - secret.yml

  tasks:
    - name: Nettoyage du fichier known_hosts
      shell: ssh-keygen -f "/root/.ssh/known_hosts" -R "{{ base_ip.rsplit('.', 1)[0] }}.{{ base_ip.rsplit('.', 1)[1]|int + index }}"
      loop: "{{ range(0, container_count) | list }}"
      loop_control:
        index_var: index

    - name: Creation d'un container
      community.general.proxmox:
        api_host: "{{ api_host }}"
        api_user: "logan_ansible@pve"
        api_token_id: "provisioning"
        api_token_secret: "{{ token_secret }}"
        node: "pve-01"
        vmid: "{{ base_vmid + index }}"
        hostname: "{{ base_hostname }}{{ '%02d' | format(index + 1) }}"
        ostemplate: "{{ template }}"
        storage: "local"
        cores: "{{ cores }}"
        memory: "{{ memory }}"
        swap: "{{ memory }}"
        netif:
          net0: "name=eth0,bridge=vmbr0,ip={{ base_ip.rsplit('.', 1)[0] }}.{{ base_ip.rsplit('.', 1)[1]|int + index }}/{{ netmask }},gw={{ gateway }}"
        nameserver: "8.8.8.8"
        password: "root!"
        unprivileged: false
        state: present
        pubkey: "{{ ssh_public_key }}"
      loop: "{{ range(0, container_count) | list }}"
      loop_control:
        index_var: index

    - name: Demarrer le container
      community.general.proxmox:
        api_host: "{{ api_host }}"
        api_user: "logan_ansible@pve"
        api_token_id: "provisioning"
        api_token_secret: "{{ token_secret }}"
        vmid: "{{ base_vmid + index }}"
        state: started
      loop: "{{ range(0, container_count) | list }}"
      loop_control:
        index_var: index

    - name: Attendre que le container obtienne une IP
      pause:
        seconds: 10

    - name: Recuperer l'IP du container
      shell: |
        ssh root@10.1.0.253 "pct exec {{ base_vmid + index }} -- ip -4 addr show eth0 | grep -oP '(?<=inet\s)\d+(\.\d+){3}'"
      register: container_ip
      retries: 5
      delay: 5
      until: container_ip.rc == 0
      loop: "{{ range(0, container_count) | list }}"
      loop_control:
        index_var: index

    - name: Reinitialiser le fichier hosts
      ansible.builtin.copy:
        dest: ./hosts
        content: "[lxc_containers]\n"

    - name: Ajouter les containers au fichier hosts (avec IP statique)
      lineinfile:
        path: ./hosts
        line: "{{ base_hostname }}{{ '%02d' | format(index + 1) }} ansible_host={{ base_ip.rsplit('.', 1)[0] }}.{{ base_ip.rsplit('.', 1)[1]|int + index }}"
        insertafter: "^\\[lxc_containers\\]"
      loop: "{{ range(0, container_count) | list }}"
      loop_control:
        index_var: index

    - name: Correction des permissions authorized_keys
      file:
        path: /root/.ssh/authorized_keys
        mode: '0600'
    

